<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Separação | Mercado Livre</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1>Sistema de Separação</h1>
 

  <main class="painel">
    <section class="blocos">
      <div class="bloco bloco-total">
        <span class="rotulo">Total de Produtos Passados</span>
        <span id="total" class="valor valor-total">0</span>
      </div>

      <div class="bloco">
        <span class="rotulo">Conteúdo Lido</span>
        <span id="conteudo" class="valor">Aguardando...</span>
      </div>

      <div class="bloco">
        <span class="rotulo">Última Leitura</span>
        <span id="horario" class="valor">--:--:--</span>
      </div>
    </section>

    <div class="status">
      <span class="status-ponto"></span>
      <span>Monitorando sistema em tempo real</span>
    </div>
  </main>

  <footer>Mercado Livre - Painel de Controle</footer>

  <script>
    const campoTotal = document.getElementById("total");
    const campoConteudo = document.getElementById("conteudo");
    const campoHorario = document.getElementById("horario");

    function mostrarErro() {
      campoConteudo.textContent = "Erro de conexão";
      campoConteudo.classList.add("erro");
    }

    function atualizarTela(dados) {
      campoConteudo.textContent = dados.conteudo || "Nenhum dado";
      campoConteudo.classList.remove("erro");

      campoHorario.textContent = dados.timestamp || "--:--:--";
      campoTotal.textContent = dados.total ?? 0;
    }

    async function buscarDados() {
      try {
        const resposta = await fetch("/dados");

        if (!resposta.ok) {
          throw new Error("Falha ao buscar os dados.");
        }

        const dados = await resposta.json();
        atualizarTela(dados);
      } catch (erro) {
        console.error("Erro ao atualizar dashboard:", erro);
        mostrarErro();
      }
    }

    buscarDados();
    setInterval(buscarDados, 1000);
  </script>

  <!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Preview da Câmera</title>
    <style>
      body { font-family: Arial, sans-serif; display:flex; flex-direction:column; align-items:center; gap:12px; margin:20px; }
      img { border:1px solid #333; max-width:90vw; height:auto; }
      .info { width:90vw; max-width:640px; display:flex; justify-content:space-between; }
    </style>
  </head>
  <body>
    <h2>Preview da Câmera</h2>
    <img id="video" src="/video_feed" alt="video feed">
    <div class="info">
      <div>Último QR lido: <strong id="qr">Aguardando leitura...</strong></div>
      <div id="ts">-</div>
    </div>

    <script>
      async function pollDados() {
        try {
          const res = await fetch('/dados');
          const j = await res.json();
          document.getElementById('qr').textContent = j.conteudo || 'Aguardando leitura...';
          document.getElementById('ts').textContent = j.timestamp || '-';
        } catch (e) {
          console.warn('poll error', e);
        } finally {
          setTimeout(pollDados, 500);
        }
      }
      pollDados();
    </script>
  </body>
</html>
</body>
</html>
