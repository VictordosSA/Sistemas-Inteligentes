<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor de QR Code - Sistema de Rastreamento</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 30px 20px;
      gap: 30px;
    }

    /* Seção da câmera */
    .camera-container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .camera-container h2 {
      color: #333;
      font-size: 18px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #video {
      width: 100%;
      max-height: 500px;
      display: block;
      background: #000;
      border-radius: 8px;
      object-fit: cover;
    }

    /* Seção de informações */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .info-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      border-left: 4px solid #667eea;
    }

    .info-card.primary {
      grid-column: span 1;
      border-left-color: #667eea;
    }

    .info-card.success {
      border-left-color: #4caf50;
    }

    .info-card.highlight {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-left-color: #764ba2;
    }

    .info-card.details {
      grid-column: span 1;
    }

    @media (min-width: 1200px) {
      .info-card.details {
        grid-column: span 2;
      }
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-card:not(.highlight) .card-title {
      color: #667eea;
    }

    .info-card.highlight .card-title {
      color: rgba(255, 255, 255, 0.9);
    }

    .card-value {
      font-size: 22px;
      font-weight: 600;
      word-break: break-word;
      line-height: 1.4;
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    .info-card:not(.highlight) .card-value {
      color: #333;
    }

    .info-card.highlight .card-value {
      color: white;
      font-size: 28px;
    }

    .card-subtitle {
      font-size: 13px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }

    .info-card.highlight .card-subtitle {
      border-top-color: rgba(255, 255, 255, 0.2);
    }

    .info-card:not(.highlight) .card-subtitle {
      color: #999;
    }

    .info-card.highlight .card-subtitle {
      color: rgba(255, 255, 255, 0.8);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-row label {
      color: #999;
      font-weight: 500;
    }

    .info-row value {
      color: #333;
      font-weight: 600;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }

    .status-badge.found {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status-badge.not-found {
      background: #fff3e0;
      color: #e65100;
    }

    .status-badge.waiting {
      background: #f5f5f5;
      color: #666;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-badge.found .status-indicator {
      background: #4caf50;
    }

    .status-badge.not-found .status-indicator {
      background: #ff9800;
    }

    .status-badge.waiting .status-indicator {
      background: #999;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .footer {
      text-align: center;
      color: #999;
      font-size: 12px;
      padding: 20px;
      border-top: 1px solid #e0e0e0;
      background: white;
      margin-top: auto;
    }

    /* Responsivo */
    @media (max-width: 768px) {
      .main-container {
        padding: 20px 15px;
        gap: 20px;
      }

      .header h1 {
        font-size: 22px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .info-card.details {
        grid-column: span 1;
      }

      #video {
        max-height: 350px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📱 Leitor de QR Code</h1>
    <p>Sistema de Rastreamento e Busca de Região</p>
  </div>

  <div class="main-container">
    <!-- Câmera -->
    <div class="camera-container">
      <h2>📷 Preview da Câmera</h2>
      <img id="video" src="/video_feed" alt="video feed" />
    </div>

    <!-- Grid de Informações -->
    <div class="info-grid">
      <!-- QR Code Lido -->
      <div class="info-card primary">
        <div class="card-title">🔍 QR Code Lido</div>
        <div class="card-value" id="qr-content">Aguardando...</div>
        <div class="card-subtitle" id="qr-time">-</div>
      </div>

      <!-- Região -->
      <div class="info-card highlight">
        <div class="card-title">📍 Região</div>
        <div class="card-value" id="regiao">Aguardando...</div>
      </div>

      <!-- Tipo de Dado -->
      <div class="info-card success">
        <div class="card-title">📊 Tipo de Dado</div>
        <div class="card-value" id="tipo-dado">-</div>
      </div>

      <!-- Informações Detalhadas -->
      <div class="info-card details">
        <div class="card-title">ℹ️ Informações Detalhadas</div>
        <div id="info-details">
          <div style="color: #999; text-align: center; padding: 20px;">
            Nenhum dado lido ainda
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>Sistema de Leitura de QR Code com Busca em Banco de Dados | Atualização em tempo real</p>
  </div>

  <script>
    function formatarInfo(info) {
      if (!info || Object.keys(info).length === 0) {
        return '<div style="color: #999; text-align: center; padding: 20px;">Nenhuma informação disponível</div>';
      }

      let html = '';
      for (const [chave, valor] of Object.entries(info)) {
        if (valor && valor !== '') {
          const labelFormatado = chave
            .replace(/_/g, ' ')
            .split(' ')
            .map(p => p.charAt(0).toUpperCase() + p.slice(1))
            .join(' ');
          html += `
            <div class="info-row">
              <label>${labelFormatado}:</label>
              <value>${valor}</value>
            </div>
          `;
        }
      }
      return html || '<div style="color: #999; text-align: center; padding: 10px;">Sem informações adicionais</div>';
    }

    function getStatusBadge(status) {
      if (status === 'encontrado') {
        return '<div class="status-badge found"><span class="status-indicator"></span> ✓ Encontrado</div>';
      } else if (status === 'não encontrado') {
        return '<div class="status-badge not-found"><span class="status-indicator"></span> ⚠ Não encontrado</div>';
      } else {
        return '<div class="status-badge waiting"><span class="status-indicator"></span> Aguardando leitura</div>';
      }
    }

    async function pollDados() {
      try {
        const res = await fetch('/dados');
        if (!res.ok) throw new Error('Erro na resposta');
        
        const dados = await res.json();
        
        // Atualizar QR Code
        document.getElementById('qr-content').textContent = dados.conteudo || 'Aguardando...';
        document.getElementById('qr-time').textContent = dados.timestamp || '-';
        
        // Atualizar Região
        document.getElementById('regiao').textContent = dados.regiao || 'Aguardando...';
        
        // Atualizar Tipo
        document.getElementById('tipo-dado').textContent = dados.tipo || '-';
        
        // Atualizar Informações Detalhadas
        document.getElementById('info-details').innerHTML = formatarInfo(dados.informacoes);
        
        // Adicionar status
        const infoDetails = document.getElementById('info-details');
        infoDetails.innerHTML += getStatusBadge(dados.status);
        
      } catch (e) {
        console.warn('Erro ao buscar dados:', e);
      } finally {
        setTimeout(pollDados, 500);
      }
    }
    
    pollDados();
  </script>
</body>
</html>
